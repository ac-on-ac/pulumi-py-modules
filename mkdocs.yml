site_name: pulumi-azure-modules
site_url: https://ac-on-ac.github.io/pulumi-py-modules/
site_description: Reusable Pulumi Python modules for deploying Azure resources
repo_url: https://github.com/ac-on-ac/pulumi-py-modules
repo_name: ac-on-ac/pulumi-py-modules
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            heading_level: 2

nav:
  - Home: index.md
  - API Reference:
    - Core: core.md
    - Networking: networking.md

markdown_extensions:
  - toc:
      toc_depth: 2
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
