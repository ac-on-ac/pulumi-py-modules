name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Detect which parts of the codebase changed using plain git diff.
  # No third-party actions required.
  #
  # When adding a new module (e.g. "storage"):
  #   1. Add an output entry below: storage: ${{ steps.detect.outputs.storage }}
  #   2. Add a grep block for it in the "Detect changed paths" step.
  #   3. Add a line in the "Determine changed test paths" step of the test job.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      any_source: ${{ steps.detect.outputs.any_source }}
      shared:     ${{ steps.detect.outputs.shared }}
      core:       ${{ steps.detect.outputs.core }}
      networking: ${{ steps.detect.outputs.networking }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so git diff can reach any base commit.
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          # Determine the comparison base:
          #   - PRs:          diff against the PR base branch tip
          #   - Push to main: diff against the commit before this push
          #   - Initial push: no previous commit — treat everything as changed
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            base=""
          else
            base="${{ github.event.before }}"
          fi

          if [[ -z "$base" ]]; then
            changed=$(git ls-files)
          else
            changed=$(git diff --name-only "$base" HEAD)
          fi

          echo "Changed files:"
          echo "$changed"

          # any_source — anything under src/, tests/, or pyproject.toml
          if echo "$changed" | grep -qE '^(src/|tests/|pyproject\.toml)'; then
            echo "any_source=true"  >> "$GITHUB_OUTPUT"
          else
            echo "any_source=false" >> "$GITHUB_OUTPUT"
          fi

          # shared — files that affect every module's tests
          if echo "$changed" | grep -qE '^(pyproject\.toml|tests/conftest\.py|src/pulumi_azure_modules/__init__\.py)'; then
            echo "shared=true"  >> "$GITHUB_OUTPUT"
          else
            echo "shared=false" >> "$GITHUB_OUTPUT"
          fi

          # core
          if echo "$changed" | grep -qE '^(src/pulumi_azure_modules/core/|tests/core/)'; then
            echo "core=true"  >> "$GITHUB_OUTPUT"
          else
            echo "core=false" >> "$GITHUB_OUTPUT"
          fi

          # networking
          if echo "$changed" | grep -qE '^(src/pulumi_azure_modules/networking/|tests/networking/)'; then
            echo "networking=true"  >> "$GITHUB_OUTPUT"
          else
            echo "networking=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Lint and type-check always run across the full src/ tree whenever any
  # source file changed — they finish in seconds and catch cross-module issues.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_source == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Check formatting with Ruff
        run: ruff format --check src/ tests/

      - name: Type-check with Mypy
        run: mypy src/

  # ---------------------------------------------------------------------------
  # Tests run across all supported Python versions, but only exercise the
  # module directories that actually changed.  If a shared file changed
  # (pyproject.toml, conftest.py, top-level __init__.py) the full suite runs.
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_source == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Determine changed test paths
        id: test-paths
        run: |
          if [[ "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            # A shared file changed — run the full test suite.
            echo "paths=tests/" >> "$GITHUB_OUTPUT"
          else
            paths=""
            [[ "${{ needs.changes.outputs.core }}"       == "true" ]] && paths="$paths tests/core/"
            [[ "${{ needs.changes.outputs.networking }}"  == "true" ]] && paths="$paths tests/networking/"
            # Add a line here for each new module, following the same pattern.
            echo "paths=$(echo "$paths" | xargs)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests with Pytest
        if: steps.test-paths.outputs.paths != ''
        run: pytest ${{ steps.test-paths.outputs.paths }} --tb=short -q
